<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

  <!-- NAV -->
  <nav id="nav">
    <a href="#" id="nav-logo"></a>
    <div id="nav-links"></div>
    <div id="nav-actions"></div>
  </nav>

  <!-- HERO -->
  <section id="hero">
    <div id="hero-inner" class="container">
      <div id="hero-text">
        <div id="hero-badge"></div>
        <h1 id="hero-h1"></h1>
        <p id="hero-sub" class="section-subtitle"></p>
        <div id="hero-actions">
          <a id="hero-cta-primary"   class="btn btn-accent btn-lg" href="#"></a>
          <a id="hero-cta-secondary" class="btn btn-ghost  btn-lg" href="#"></a>
        </div>
        <p id="hero-proof"></p>
      </div>
      <div id="hero-image-wrap"></div>
    </div>
  </section>

  <!-- LOGOS -->
  <div id="logos">
    <div id="logos-inner">
      <p id="logos-label"></p>
      <div id="logos-list"></div>
    </div>
  </div>

  <!-- FEATURES -->
  <section id="features">
    <div class="container">
      <div id="features-header">
        <p class="section-label">Features</p>
        <h2 class="section-title" id="features-title"></h2>
        <p class="section-subtitle" id="features-subtitle"></p>
      </div>
      <div id="features-grid"></div>
    </div>
  </section>

  <!-- HOW IT WORKS -->
  <section id="how-it-works">
    <div class="container">
      <div id="how-it-works-header">
        <p class="section-label">How it works</p>
        <h2 class="section-title" id="hiw-title"></h2>
        <p class="section-subtitle" id="hiw-subtitle"></p>
      </div>
      <div id="steps"></div>
    </div>
  </section>

  <!-- PRICING -->
  <section id="pricing">
    <div class="container">
      <div id="pricing-header">
        <p class="section-label">Pricing</p>
        <h2 class="section-title" id="pricing-title"></h2>
        <p class="section-subtitle" id="pricing-subtitle"></p>
      </div>
      <div id="billing-toggle">
        <span class="toggle-opt active" data-billing="monthly">Monthly</span>
        <span class="toggle-opt"        data-billing="annual">
          Annual <span id="toggle-annual-badge" class="toggle-badge"></span>
        </span>
      </div>
      <div id="pricing-grid"></div>
      <div id="pricing-enterprise" class="pricing-enterprise">
        <div class="enterprise-text">
          <strong>Need something bigger?</strong>
          <span>Custom pricing, SSO, dedicated support, and SLAs for large organizations.</span>
        </div>
        <a href="mailto:" class="btn btn-ghost">Contact sales →</a>
      </div>
    </div>
  </section>

  <!-- TESTIMONIALS -->
  <section id="testimonials">
    <div class="container">
      <div id="testimonials-header">
        <p class="section-label">Testimonials</p>
        <h2 class="section-title" id="testimonials-title"></h2>
      </div>
      <div id="testimonials-grid"></div>
    </div>
  </section>

  <!-- FAQ -->
  <section id="faq">
    <div id="faq-inner">
      <div id="faq-header">
        <p class="section-label">FAQ</p>
        <h2 class="section-title" id="faq-title"></h2>
      </div>
      <div id="faq-list"></div>
    </div>
  </section>

  <!-- BOTTOM CTA -->
  <section id="bottom-cta">
    <h2 id="cta-headline"></h2>
    <p  id="cta-subtitle"></p>
    <a  id="bottom-cta-btn" class="btn btn-accent btn-lg" href="#"></a>
  </section>

  <!-- FOOTER -->
  <footer id="footer">
    <div class="container">
      <div id="footer-top">
        <div id="footer-brand">
          <p id="footer-brand-name"></p>
          <p id="footer-brand-tag"></p>
          <div id="footer-social"></div>
        </div>
        <div id="footer-cols" style="display:contents"></div>
      </div>
      <div id="footer-bottom">
        <span id="footer-copy"></span>
      </div>
    </div>
  </footer>

  <script src="config.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
