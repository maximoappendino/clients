<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

  <!-- ─── NAV ─────────────────────────────────────────────────────────── -->
  <nav id="nav">
    <a href="#" id="nav-logo"></a>
    <div id="nav-search">
      <input id="search-input" type="search" placeholder="Buscar productos…" autocomplete="off">
    </div>
    <button id="cart-btn" aria-label="Carrito">
      🛒
      <span id="cart-count"></span>
    </button>
  </nav>

  <!-- ─── HERO ─────────────────────────────────────────────────────────── -->
  <section id="hero">
    <div id="hero-content">
      <h1 id="hero-title"></h1>
      <p  id="hero-subtitle"></p>
      <a  id="hero-cta" href="#catalog"></a>
    </div>
  </section>

  <!-- ─── CATALOG ──────────────────────────────────────────────────────── -->
  <main id="catalog">
    <div id="categories"></div>
    <div id="products-grid">
      <!-- rendered by app.js -->
    </div>
    <div id="empty-state">No se encontraron productos.</div>
  </main>

  <!-- ─── FOOTER ───────────────────────────────────────────────────────── -->
  <footer id="footer">
    <div id="footer-social"></div>
    <p id="footer-text"></p>
  </footer>

  <!-- ─── PRODUCT MODAL ────────────────────────────────────────────────── -->
  <div id="modal-overlay">
    <button id="modal-close" aria-label="Cerrar">×</button>
    <div id="modal">
      <div id="modal-img"></div>
      <div id="modal-body">
        <p id="modal-category"></p>
        <h2 id="modal-name"></h2>
        <p id="modal-price"></p>
        <p id="modal-description"></p>
        <div id="modal-actions">
          <button id="modal-add-btn"></button>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── CART DRAWER ──────────────────────────────────────────────────── -->
  <div id="cart-overlay">
    <div id="cart-drawer">
      <div id="cart-header">
        <h2>Tu carrito</h2>
        <button id="cart-close" aria-label="Cerrar carrito">×</button>
      </div>
      <div id="cart-items"></div>
      <p id="cart-empty">Tu carrito está vacío.</p>
      <div id="cart-footer">
        <div id="cart-subtotal"></div>
        <p id="cart-shipping-note"></p>
        <button id="whatsapp-checkout">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.531 5.858L0 24l6.322-1.508A11.95 11.95 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.003-1.366l-.359-.213-3.712.885.916-3.613-.233-.372A9.783 9.783 0 012.182 12C2.182 6.58 6.58 2.182 12 2.182c5.421 0 9.818 4.398 9.818 9.818 0 5.421-4.397 9.818-9.818 9.818z"/></svg>
          Pedir por WhatsApp
        </button>
      </div>
    </div>
  </div>

  <!-- ─── FLOATING WHATSAPP ─────────────────────────────────────────────── -->
  <a id="whatsapp-float" href="#" target="_blank" rel="noopener" aria-label="WhatsApp">
    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.531 5.858L0 24l6.322-1.508A11.95 11.95 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.003-1.366l-.359-.213-3.712.885.916-3.613-.233-.372A9.783 9.783 0 012.182 12C2.182 6.58 6.58 2.182 12 2.182c5.421 0 9.818 4.398 9.818 9.818 0 5.421-4.397 9.818-9.818 9.818z"/></svg>
  </a>

  <!-- ─── TOAST ─────────────────────────────────────────────────────────── -->
  <div id="toast"></div>

  <!-- ─── SCRIPTS ──────────────────────────────────────────────────────── -->
  <script src="config.js"></script>
  <script src="scripts/cart.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
